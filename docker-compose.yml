services:
    # Nginx
    nginx:
        image: nginx:alpine
        container_name: running-tickets-nginx
        restart: unless-stopped
        ports:
            - "80:80"
        volumes:
            - ./api:/var/www
            - .docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        networks:
            - running-tickets-network

    # MySQL
    mysql:
        image: mysql:8.4
        container_name: running-tickets-mysql
        restart: unless-stopped
        environment:
            MYSQL_USER: ${DB_USERNAME:-laravel}
            MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
            MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
            MYSQL_DATABASE: ${DB_DATABASE:-running_tickets}
            SERVICE_TAGS: dev
            SERVICE_NAME: mysql
        volumes:
            - mysql-data:/var/lib/mysql
        networks:
            - running-tickets-network
        ports:
            - "3306:3306"
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
            timeout: 5s
            retries: 10

    # Aplicação Laravel
    api:
        build:
            context: ./api
            dockerfile: Dockerfile
        container_name: running-tickets-api
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - ./api:/var/www
        networks:
            - running-tickets-network
        depends_on:
            - nginx
            - mysql

    # Queue Worker
    queue-worker:
        build:
            context: ./api
            dockerfile: Dockerfile
        container_name: running-tickets-queue
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - ./api:/var/www
        networks:
            - running-tickets-network
        depends_on:
            - mysql
        command: php artisan queue:work --verbose --tries=3 --timeout=60

    # Scheduler (Tarefas agendadas)
    scheduler:
        build:
            context: ./api
            dockerfile: Dockerfile
        container_name: running-tickets-scheduler
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - ./api:/var/www
        networks:
            - running-tickets-network
        depends_on:
            - mysql
        command: php artisan schedule:work

    # Frontend Client (Público)
    client:
        image: node:24.14-alpine
        container_name: running-tickets-client
        restart: unless-stopped
        working_dir: /app
        volumes:
            - ./client:/app
        ports:
            - "5173:5173"
        networks:
            - running-tickets-network
        depends_on:
            - api
        command: sh -c "npm i && npm run dev -- --host"

    # Frontend Admin (Backoffice)
    admin:
        image: node:24.14-alpine
        container_name: running-tickets-admin
        restart: unless-stopped
        working_dir: /app
        volumes:
            - ./admin:/app
        ports:
            - "5174:5174"
        networks:
            - running-tickets-network
        depends_on:
            - api
        command: sh -c "npm i && npm run dev -- --host"

networks:
    running-tickets-network:
        driver: bridge

volumes:
    mysql-data:
        driver: local
