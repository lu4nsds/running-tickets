services:
    # Aplicação Laravel
    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: running-tickets-app
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - ./:/var/www
        networks:
            - running-tickets-network
        depends_on:
            - mysql

    # Nginx
    nginx:
        image: nginx:alpine
        container_name: running-tickets-nginx
        restart: unless-stopped
        ports:
            - "8000:80"
        volumes:
            - ./:/var/www
            - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
        networks:
            - running-tickets-network
        depends_on:
            - app

    # MySQL
    mysql:
        image: mysql:8.0
        container_name: running-tickets-mysql
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: ${DB_DATABASE}
            MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
            MYSQL_USER: ${DB_USERNAME}
            MYSQL_PASSWORD: ${DB_PASSWORD}
            SERVICE_TAGS: dev
            SERVICE_NAME: mysql
        volumes:
            - mysql-data:/var/lib/mysql
        networks:
            - running-tickets-network
        ports:
            - "3306:3306"
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
            timeout: 5s
            retries: 10

    # Queue Worker
    queue-worker:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: running-tickets-queue
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - ./:/var/www
        networks:
            - running-tickets-network
        depends_on:
            - mysql
            - app
        command: php artisan queue:work --verbose --tries=3 --timeout=60

    # Frontend Client (Público)
    client:
        build:
            context: ./client
            dockerfile: Dockerfile
        container_name: running-tickets-client
        restart: unless-stopped
        working_dir: /app
        volumes:
            - ./client:/app
            - /app/node_modules
        ports:
            - "3000:5173"
        networks:
            - running-tickets-network
        environment:
            - VITE_API_URL=http://localhost:8000/api

    # Frontend Admin (Backoffice)
    admin:
        build:
            context: ./admin
            dockerfile: Dockerfile
        container_name: running-tickets-admin
        restart: unless-stopped
        working_dir: /app
        volumes:
            - ./admin:/app
            - /app/node_modules
        ports:
            - "3001:5173"
        networks:
            - running-tickets-network
        environment:
            - VITE_API_URL=http://localhost:8000/api

networks:
    running-tickets-network:
        driver: bridge

volumes:
    mysql-data:
        driver: local
